name: Release Extension

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate release tag matches package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "::error::Missing release tag name"
            exit 1
          fi

          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${TAG_NAME#v}"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

          mkdir -p artifacts
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VSIX_PATH=artifacts/antigravity-token-monitor-$PKG_VERSION.vsix" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run webview tests
        run: npm run test:webview

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --out "$VSIX_PATH"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath "$VSIX_PATH" --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish "$VSIX_PATH"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG_NAME" "$VSIX_PATH" --clobber
